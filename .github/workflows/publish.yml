name: MAUI Multi-Platform Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      should-push-packages:
        description: 'Push package to NuGet.org feed'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  
env:
  NET_VERSION: '10.0.x'
  NET_VERSION_STRING: '10'
  TARGET_FRAMEWORK: 'net10.0'
  TARGET_FRAMEWORK_IOS: 'net10.0-ios'
  TARGET_FRAMEWORK_ANDROID: 'net10.0-android'
  TARGET_FRAMEWORK_WINDOWS: 'net10.0-windows10.0.19041.0'
  CSPROJ_PATH: 'mauikit.navigation/mauikit.navigation.core/mauikit.navigation.core.csproj'
  PROJECT_PATH: 'mauikit.navigation/mauikit.navigation.core'
  PACKAGE_ID: 'MauiKit.Core'
  
jobs:
  ios:
    name: Build iOS
    runs-on: macos-15
    
    steps:

      - name: Echo workflow parameters
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Should push (manual): ${{ inputs.should-push-packages }}"
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessario per GitVersion
      
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v0.10.2
        with:
          versionSpec: '5.x'
      
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.10.2
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.NET_VERSION }}
      
      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios maui-android
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.CSPROJ_PATH }}
      
      - name: Run Unit Tests
        if: ${{ env.TEST_PROJECTS != '' }}
        run: dotnet test ${{ env.TEST_PROJECTS }}
        env:
          TEST_PROJECTS: ''  # Aggiungi i tuoi progetti di test separati da spazio
      
      - name: Build iOS
        run: |
          dotnet build ${{ env.CSPROJ_PATH }} \
            -c Release \
            -f ${{ env.TARGET_FRAMEWORK_IOS }} \
            --no-restore \
            -o ${{ github.workspace }}/artifacts/${{ env.TARGET_FRAMEWORK_IOS }}
      
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARGET_FRAMEWORK_IOS }}
          path: ${{ github.workspace }}/artifacts/${{ env.TARGET_FRAMEWORK_IOS }}
          retention-days: 7

  android-windows:
    name: Build Android and Windows
    runs-on: windows-2025
    needs: ios
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v0.10.2
        with:
          versionSpec: '5.x'
      
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.10.2
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.NET_VERSION }}
      
      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TARGET_FRAMEWORK_IOS }}
          path: ${{ github.workspace }}/downloaded-artifacts/${{ env.TARGET_FRAMEWORK_IOS }}
      
      - name: Move iOS artifact to merge folder
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/${{ env.PROJECT_PATH }}/bin/Release/${{ env.TARGET_FRAMEWORK_IOS }}"
          cp -r "${{ github.workspace }}/downloaded-artifacts/${{ env.TARGET_FRAMEWORK_IOS }}/"* "${{ github.workspace }}/${{ env.PROJECT_PATH }}/bin/Release/${{ env.TARGET_FRAMEWORK_IOS }}/"
          ls -la "${{ github.workspace }}/${{ env.PROJECT_PATH }}/bin/Release/${{ env.TARGET_FRAMEWORK_IOS }}/"
      
      - name: Install MAUI workloads
        run: dotnet workload install maui-android maui
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.CSPROJ_PATH }}
      
      - name: Build Android
        run: |
          dotnet build ${{ env.CSPROJ_PATH }} `
            -c Release `
            -f ${{ env.TARGET_FRAMEWORK_ANDROID }} `
            --no-restore
      
      - name: Build Windows
        run: |
          dotnet build ${{ env.CSPROJ_PATH }} `
            -c Release `
            -f ${{ env.TARGET_FRAMEWORK_WINDOWS }} `
            --no-restore
      
      - name: Build Base Framework
        run: |
          dotnet build ${{ env.CSPROJ_PATH }} `
            -c Release `
            -f ${{ env.TARGET_FRAMEWORK }} `
            --no-restore
      
      - name: Pack NuGet package
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/nupkg"
          dotnet pack ${{ env.CSPROJ_PATH }} `
            -c Release `
            -o "${{ github.workspace }}/nupkg" `
            --no-build `
            --no-restore `
            -p:PackageVersion=${{ steps.gitversion.outputs.fullSemVer }} `
            -p:PackageId=${{ env.PACKAGE_ID }}
      
      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ${{ github.workspace }}/nupkg/*.nupkg
          retention-days: 30

      - name: Determine if should push
        id: should-push
        shell: bash
        run: |
          SHOULD_PUSH="false"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHOULD_PUSH="${{ inputs.should-push-packages }}"
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            SHOULD_PUSH="false"
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            SHOULD_PUSH="false"
          fi
          
          echo "should-push=$SHOULD_PUSH" >> $GITHUB_OUTPUT
          echo "Will push packages: $SHOULD_PUSH"
      
      - name: Diagnose and Push to NuGet.org
        if: steps.should-push.outputs.should-push == 'true'
        shell: pwsh
        run: |
          $packageId = "${{ env.PACKAGE_ID }}"
          $version = "${{ steps.gitversion.outputs.fullSemVer }}"
          $nupkgPath = Join-Path "${{ github.workspace }}" "nupkg"
          
          Write-Host "════════════════════════════════════════════════"
          Write-Host "🔍 NUGET PACKAGE DIAGNOSTICS"
          Write-Host "════════════════════════════════════════════════"
          Write-Host "Package ID: $packageId"
          Write-Host "Version: $version"
          Write-Host ""
          
          # 1. Verifica esistenza su NuGet.org
          Write-Host "📋 Step 1: Checking if package exists on NuGet.org..."
          try {
            $url = "https://api.nuget.org/v3-flatcontainer/$($packageId.ToLower())/index.json"
            $response = Invoke-RestMethod -Uri $url -ErrorAction Stop
            $existingVersions = $response.versions
            
            Write-Host "✅ Package exists with $($existingVersions.Count) versions:"
            $existingVersions | ForEach-Object { Write-Host "   - $_" }
            
            if ($existingVersions -contains $version) {
              Write-Host ""
              Write-Host "⚠️  WARNING: Version $version already exists!" -ForegroundColor Yellow
              Write-Host "🔗 View it at: https://www.nuget.org/packages/$packageId/$version"
              Write-Host "💡 You need to increment the version to publish a new package"
              exit 0  # Non è un errore, semplicemente esiste già
            }
          }
          catch {
            Write-Host "ℹ️  Package not yet published (this is normal for first publish)" -ForegroundColor Cyan
          }
          
          Write-Host ""
          Write-Host "📋 Step 2: Verifying local package..."
          $packages = Get-ChildItem $nupkgPath -Filter *.nupkg
          
          if ($packages.Count -eq 0) {
            Write-Error "❌ No .nupkg files found in $nupkgPath"
            exit 1
          }
          
          Write-Host "✅ Found $($packages.Count) package(s) to push"
          
          # 2. Push del package
          Write-Host ""
          Write-Host "📋 Step 3: Pushing to NuGet.org..."
          
          foreach ($pkg in $packages) {
            Write-Host ""
            Write-Host "📦 Pushing: $($pkg.Name)"
            Write-Host "   Size: $([math]::Round($pkg.Length / 1MB, 2)) MB"
            
            # Cattura tutto l'output
            $pushOutput = dotnet nuget push $pkg.FullName `
              --source "https://api.nuget.org/v3/index.json" `
              --api-key ${{ secrets.NUGET_API_KEY }} `
              --skip-duplicate `
              --timeout 300 2>&1 | Out-String
            
            $exitCode = $LASTEXITCODE
            
            Write-Host $pushOutput
            
            # Analisi del risultato
            if ($exitCode -eq 0) {
              if ($pushOutput -match "already exists|Conflict") {
                Write-Host ""
                Write-Host "═══════════════════════════════════════" -ForegroundColor Yellow
                Write-Host "⚠️  PACKAGE CONFLICT DETECTED" -ForegroundColor Yellow
                Write-Host "═══════════════════════════════════════" -ForegroundColor Yellow
                Write-Host ""
                Write-Host "Possible reasons:" -ForegroundColor Yellow
                Write-Host "1. 🕐 Package was just uploaded and is in validation (wait 10-15 min)"
                Write-Host "2. 🗑️  Package was deleted recently (soft-delete, wait 24-48 hours)"
                Write-Host "3. 📌 Version $version already exists (increment version)"
                Write-Host ""
                Write-Host "🔗 Check: https://www.nuget.org/packages/$packageId"
                Write-Host "📧 If issue persists: https://www.nuget.org/policies/Contact"
              }
              else {
                Write-Host ""
                Write-Host "✅ Successfully pushed!" -ForegroundColor Green
                Write-Host "🔗 View at: https://www.nuget.org/packages/$packageId/$version"
                Write-Host "⏳ Note: May take 10-15 minutes to appear in search"
              }
            }
            else {
              Write-Host ""
              Write-Error "❌ Push failed with exit code: $exitCode"
              exit 1
            }
          }
          
          Write-Host ""
          Write-Host "════════════════════════════════════════════════"
          Write-Host "✅ PUSH OPERATION COMPLETED"
          Write-Host "════════════════════════════════════════════════"
